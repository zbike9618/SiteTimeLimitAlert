<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>サイト閲覧制限</title>
    <style>
        :root {
            --bg-color: #fce4ec;
            --text-color: #c62828;
            --container-bg: white;
            --shadow: rgba(0, 0, 0, 0.1);
            --desc-color: #555;
            --sub-bg: #fff3e0;
            --label-color: #ef6c00;
        }

        [data-theme="dark"] {
            --bg-color: #202124;
            --text-color: #ef9a9a;
            /* Softer red for dark mode */
            --container-bg: #292a2d;
            --shadow: rgba(0, 0, 0, 0.5);
            --desc-color: #e8eaed;
            --sub-bg: #3c4043;
            --label-color: #ffb74d;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: var(--container-bg);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px var(--shadow);
            max-width: 500px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 30px;
            line-height: 1.6;
            color: var(--desc-color);
        }

        #domainName {
            font-weight: bold;
            color: var(--text-color);
            /* Match main text color or slightly different */
        }

        .btn {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #357ae8;
        }

        .btn-snooze {
            background-color: #ff9800;
        }

        .btn-snooze:hover {
            background-color: #fb8c00;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🛑 制限時間に達しました</h1>
        <p>
            サイト: <span id="domainName">...</span><br>
            設定された閲覧制限時間を超えました。<br>
            目を休めて、他のことに集中しましょう。
        </p>

        <div>
            <!-- タブを閉じるのはJSで制限がある場合が多いが試みる -->
            <button id="closeBtn" class="btn">タブを閉じる</button>

            <div style="margin-top: 15px; background: var(--sub-bg); padding: 10px; border-radius: 5px;">
                <label for="extendMinutes" style="font-size:14px; color:var(--label-color);">延長時間: </label>
                <select id="extendMinutes"
                    style="padding: 5px; font-size: 14px; border-radius: 4px; border: 1px solid #ccc;">
                    <option value="1">1分</option>
                    <option value="3">3分</option>
                    <option value="5" selected>5分</option>
                    <option value="10">10分</option>
                </select>
                <button id="extendBtn" class="btn btn-snooze" style="font-size: 14px; padding: 8px 15px;">延長する</button>
            </div>
        </div>
    </div>
    <script src="block.js"></script>
</body>

</html>
