<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>サイト閲覧制限</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fce4ec;
            /* 薄い赤色 */
            color: #c62828;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 30px;
            line-height: 1.6;
            color: #555;
        }

        #domainName {
            font-weight: bold;
            color: #333;
        }

        .btn {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #357ae8;
        }

        .btn-snooze {
            background-color: #ff9800;
        }

        .btn-snooze:hover {
            background-color: #fb8c00;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🛑 制限時間に達しました</h1>
        <p>
            サイト: <span id="domainName">...</span><br>
            設定された閲覧制限時間を超えました。<br>
            目を休めて、他のことに集中しましょう。
        </p>

        <div>
            <!-- タブを閉じるのはJSで制限がある場合が多いが試みる -->
            <button id="closeBtn" class="btn">タブを閉じる</button>
            <button id="snoozeBtn" class="btn btn-snooze">あと5分だけ延長</button>
        </div>
    </div>
    <script src="block.js"></script>
</body>

</html>
